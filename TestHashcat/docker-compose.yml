services:
  hashtopolis-db:
    image: mysql:8.4
    container_name: hashtopolis-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    volumes:
      - hashtopolis-db-data:/var/lib/mysql

  hashtopolis-backend:
    image: hashtopolis/backend:latest
    container_name: hashtopolis-backend
    restart: unless-stopped
    depends_on:
      - hashtopolis-db
    environment:
      HASHTOPOLIS_DB_HOST: hashtopolis-db
      HASHTOPOLIS_DB_DATABASE: "${MYSQL_DATABASE}"
      HASHTOPOLIS_DB_USER: "${MYSQL_USER}"
      HASHTOPOLIS_DB_PASS: "${MYSQL_PASSWORD}"
      HASHTOPOLIS_ADMIN_USER: "${HASHTOPOLIS_ADMIN_USER}"
      HASHTOPOLIS_ADMIN_PASSWORD: "${HASHTOPOLIS_ADMIN_PASSWORD}"
      HASHTOPOLIS_APIV2_ENABLE: "1"
      HASHTOPOLIS_BACKEND_URL: "${HTP_PUBLIC_URL}/api/v2"
    volumes:
      - hashtopolis-backend-data:/var/www/html

  hashtopolis-frontend:
    image: hashtopolis/frontend:latest
    container_name: hashtopolis-frontend
    restart: unless-stopped
    depends_on:
      - hashtopolis-backend
    environment:
      HASHTOPOLIS_BACKEND_URL: "${HTP_PUBLIC_URL}/api/v2"

  hashtopolis-proxy:
    image: nginx:alpine
    container_name: hashtopolis-proxy
    restart: unless-stopped
    depends_on:
      - hashtopolis-backend
      - hashtopolis-frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  hashtopolis-agent:
    build:
      context: ./agent
    container_name: hashtopolis-agent
    restart: unless-stopped
    depends_on:
      - hashtopolis-proxy
    environment:
      HTP_API_URL: "${HTP_AGENT_API_URL}"
      HTP_VOUCHER: "${HTP_VOUCHER}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES}"
    volumes:
      - hashtopolis-agent-data:/opt/hashtopolis-agent
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  hashtopolis-db-data:
  hashtopolis-backend-data:
  hashtopolis-agent-data:
